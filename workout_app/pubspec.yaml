name: workout_app
description: "LiftLog - A workout tracking app built with Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.1
  shared_preferences: ^2.3.2
  path_provider: ^2.1.3
  uuid: ^4.4.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  # health: ^10.2.5
  file_picker: ^8.1.2
  share_plus: ^10.0.0
  permission_handler: ^11.3.1
  http: ^1.2.0
  health: ^13.3.1
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_messaging: ^16.2.0
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
